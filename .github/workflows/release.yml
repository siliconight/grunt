name: grunt Release
run-name: "grunt Release ${{ github.ref_name }}"

# Tag pushes only. Builds + verifies on the real toolchain, then publishes the
# source tarball as a GitHub Release. build/ci gating mirrors ci.yml so a tag
# can't release something that doesn't build or pass tests.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify:
    name: "verify ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvorbis + ffmpeg
        run: sudo apt-get update && sudo apt-get install -y libvorbis-dev libogg-dev cmake ffmpeg

      - name: Configure + build (warnings as errors)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_WERROR=ON
          cmake --build build --config Release -- -j2

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Install piper (speech engine) for the speech path
        run: pip install piper-tts

      - name: Fetch a voice model (for the speech path)
        run: ./build/grunt fetch-voice --model piper-en_US-ljspeech

      - name: Smoke bake + codec check
        run: |
          # woman_raspy's base voice is piper-en_US-ljspeech (fetched above), so
          # this exercises the speech + style + OGG/Vorbis path with a voice we
          # have — no norman needed. Matches ci.yml's smoke bake.
          ./build/grunt batch --csv scripts/sample_lines.csv \
            --character woman_raspy --out-dir build/vo
          test -f build/vo/mission01_open_gate.ogg \
            || (echo "expected .ogg output not produced" && exit 1)
          codec=$(ffprobe -loglevel error -show_entries stream=codec_name \
            -of default=nw=1:nk=1 build/vo/mission01_open_gate.ogg)
          test "$codec" = "vorbis" || (echo "expected vorbis, got $codec" && exit 1)

  release:
    needs: verify
    name: "release ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build source tarball
        id: pkg
        run: echo "path=$(bash scripts/package.sh dist)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: grunt ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.path }}

  windows-gui:
    # Build a double-click Windows package: grunt_gui.exe + CLI + data/ + the
    # bundled demo bank, zipped and attached to the Release. Lets a non-builder
    # download, unzip, and run the GUI. (Unsigned — first launch shows a
    # SmartScreen notice; documented in SETUP.md. Signing needs a paid cert.)
    needs: verify
    name: "windows package ${{ github.ref_name }}"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor GUI deps (imgui, miniaudio, stb_image)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/ocornut/imgui third_party/imgui
          mkdir -p third_party/miniaudio third_party/stb
          curl -L https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h \
            -o third_party/miniaudio/miniaudio.h
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
            -o third_party/stb/stb_image.h

      - name: Install GLFW + libvorbis (vcpkg)
        shell: bash
        run: vcpkg install glfw3 libvorbis libogg

      - name: Configure + build (GUI on)
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_BUILD_GUI=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Pre-bake starter word bank (modern Piper, so first launch speaks)
        shell: bash
        continue-on-error: true
        run: |
          # Best-effort: install modern Piper (pip), download the public-domain LJ
          # voice, and bake the curated starter vocabulary into a real, gate-clean
          # word bank that ships in the package — so a user hears English words
          # with ZERO setup. If anything fails the release still proceeds.
          set +e
          GRUNT=$(find build -name 'grunt.exe' | head -1)
          python -m pip install --quiet --upgrade piper-tts || { echo "pip install piper-tts failed"; exit 0; }
          python -m piper --help >/dev/null 2>&1 || { echo "piper not runnable"; exit 0; }
          export GRUNT_PIPER_CMD="python -m piper"
          mkdir -p "$(dirname "$GRUNT")/data"
          cp data/*.json "$(dirname "$GRUNT")/data/" 2>/dev/null
          "$GRUNT" fetch-voice --model piper-en_US-ljspeech
          "$GRUNT" generate --units examples/starter_barks.csv \
            --voice voices/starter --model piper-en_US-ljspeech
          if [ -f voices/starter/metadata/units.json ] && grep -q '"type": "word"' voices/starter/metadata/units.json; then
            "$GRUNT" verify --voice voices/starter
            echo "STARTER_OK=1" >> "$GITHUB_ENV"
            echo "starter bank baked and verified"
          else
            echo "starter bank not generated — package will ship demo bank only"
          fi
          exit 0

      - name: Assemble package
        shell: bash
        run: |
          pkg="grunt-${{ github.ref_name }}-windows"
          mkdir -p "$pkg"
          # binaries (location varies by generator; copy whatever built)
          find build -name 'grunt_gui.exe' -exec cp {} "$pkg/" \;
          find build -name 'grunt.exe'     -exec cp {} "$pkg/" \;
          # runtime DLLs that vcpkg produced, next to the exe
          find build -name '*.dll' -exec cp {} "$pkg/" \; || true
          # bundled resources, resolved relative to the exe at runtime
          cp -r data "$pkg/"
          cp -r voices "$pkg/"
          cp -r examples "$pkg/"
          cp -r assets "$pkg/" 2>/dev/null || true   # window/taskbar icon (grunt_icon64.png)
          cp README.md SETUP.md "$pkg/" 2>/dev/null || true
          cp setup.bat "$pkg/" 2>/dev/null || true
          # setup.bat already has CRLF endings via .gitattributes (*.bat eol=crlf),
          # so git checks it out CRLF and this copy preserves it — no conversion
          # needed (a previous inline-PowerShell attempt broke the bash step).
          # a friendly launch note
          printf 'Double-click grunt_gui.exe to start.\nFirst launch: Windows may show a SmartScreen notice (unsigned app) -- click More info > Run anyway.\n\nThe "starter" voice bank speaks REAL WORDS out of the box - just pick a\ncharacter and Play.\n\nFOR FOUR READY-MADE NPC VOICES: run setup.bat. It installs the speech engine,\ndownloads the public-domain voices, and bakes four NPC bark sets you can drop\nstraight into a game:\n  cop_vo\\     FBI / cop      (clean, radio)\n  jersey_vo\\  Italian NJ mob (raspy, mid)\n  russian_vo\\ Russian mafia  (deep, cold)\n  delco_vo\\   Delco PA lead  (young, scrappy)\n\nThen in the app: pick cop / jersey / russian / delco from the Character list,\ntype a line, tune it with the sliders, and use the Bark list panel to build and\nbake your own sets. No install needed; everything stays in this folder.\n' > "$pkg/READ ME FIRST.txt"
          7z a "$pkg.zip" "$pkg"
          echo "GRUNT_WIN_ZIP=$pkg.zip" >> "$GITHUB_ENV"

      - name: Attach Windows package to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.GRUNT_WIN_ZIP }}
