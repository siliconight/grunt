name: grunt Release
run-name: "grunt Release ${{ github.ref_name }}"

# Tag pushes only. Builds + verifies on the real toolchain, then publishes the
# source tarball as a GitHub Release. build/ci gating mirrors ci.yml so a tag
# can't release something that doesn't build or pass tests.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify:
    name: "verify ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvorbis + ffmpeg
        run: sudo apt-get update && sudo apt-get install -y libvorbis-dev libogg-dev cmake ffmpeg

      - name: Configure + build (warnings as errors)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_WERROR=ON
          cmake --build build --config Release -- -j2

      - name: Unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Smoke bake + codec check
        run: |
          ./build/grunt batch --csv scripts/sample_lines.csv \
            --voice voices/heavy_brother --out-dir build/vo --seed 1234
          codec=$(ffprobe -loglevel error -show_entries stream=codec_name \
            -of default=nw=1:nk=1 build/vo/mission01_open_gate.ogg)
          test "$codec" = "vorbis" || (echo "expected vorbis, got $codec" && exit 1)

  release:
    needs: verify
    name: "release ${{ github.ref_name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build source tarball
        id: pkg
        run: echo "path=$(bash scripts/package.sh dist)" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: grunt ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.pkg.outputs.path }}

  windows-gui:
    # Build a double-click Windows package: grunt_gui.exe + CLI + data/ + the
    # bundled demo bank, zipped and attached to the Release. Lets a non-builder
    # download, unzip, and run the GUI. (Unsigned — first launch shows a
    # SmartScreen notice; documented in SETUP.md. Signing needs a paid cert.)
    needs: verify
    name: "windows package ${{ github.ref_name }}"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vendor GUI deps (imgui, miniaudio, stb_image)
        shell: bash
        run: |
          git clone --depth 1 https://github.com/ocornut/imgui third_party/imgui
          mkdir -p third_party/miniaudio third_party/stb
          curl -L https://raw.githubusercontent.com/mackron/miniaudio/master/miniaudio.h \
            -o third_party/miniaudio/miniaudio.h
          curl -L https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
            -o third_party/stb/stb_image.h

      - name: Install GLFW + libvorbis (vcpkg)
        shell: bash
        run: vcpkg install glfw3 libvorbis libogg

      - name: Configure + build (GUI on)
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_BUILD_GUI=ON \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release

      - name: Assemble package
        shell: bash
        run: |
          pkg="grunt-${{ github.ref_name }}-windows"
          mkdir -p "$pkg"
          # binaries (location varies by generator; copy whatever built)
          find build -name 'grunt_gui.exe' -exec cp {} "$pkg/" \;
          find build -name 'grunt.exe'     -exec cp {} "$pkg/" \;
          # runtime DLLs that vcpkg produced, next to the exe
          find build -name '*.dll' -exec cp {} "$pkg/" \; || true
          # bundled resources, resolved relative to the exe at runtime
          cp -r data "$pkg/"
          cp -r voices "$pkg/"
          cp -r examples "$pkg/"
          cp README.md SETUP.md "$pkg/" 2>/dev/null || true
          cp setup.bat "$pkg/" 2>/dev/null || true
          # a friendly launch note
          printf 'Double-click grunt_gui.exe to start (uses the bundled grunt-noise demo bank).\nFirst launch: Windows may show a SmartScreen notice (unsigned app) -- click More info > Run anyway.\n\nTo hear REAL SPOKEN WORDS: double-click setup.bat once. It downloads the Piper\nspeech engine + a public-domain voice, builds a talking bank, and plays a word.\nThen in the GUI open "advanced" and point the bank at voices\\my_guards.\n\nNo install needed; everything stays in this folder.\n' > "$pkg/READ ME FIRST.txt"
          7z a "$pkg.zip" "$pkg"
          echo "GRUNT_WIN_ZIP=$pkg.zip" >> "$GITHUB_ENV"

      - name: Attach Windows package to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ env.GRUNT_WIN_ZIP }}
