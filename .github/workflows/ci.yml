name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Resolve the version being built once, share it with every downstream job.
  # On a tag push -> the tag (v0.2.2). On a branch/PR -> describe/short-sha.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
          else
            VER="$(git describe --tags --always 2>/dev/null || echo dev)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building grunt $VER"

  # Lesson from gool: static reading is not verification. CI builds with the
  # real toolchain + real libvorbis, runs tests, and a smoke bake.
  linux:
    needs: version
    name: "linux (${{ needs.version.outputs.version }})"
    runs-on: ubuntu-latest
    env:
      GRUNT_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Report version under test
        run: echo "Building and testing grunt $GRUNT_VERSION"

      - name: Install libvorbis + libogg dev
        run: sudo apt-get update && sudo apt-get install -y libvorbis-dev libogg-dev cmake ffmpeg

      - name: Configure (Release, with libvorbis, warnings as errors)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_WERROR=ON

      - name: Verify OGG support was detected
        run: |
          cmake -S . -B build_check 2>&1 | tee cfg.txt
          grep -q "OGG/Vorbis output enabled" cfg.txt \
            || (echo "libvorbis NOT detected by CMake — OGG path would be untested" && exit 1)

      - name: Build
        run: cmake --build build --config Release -- -j2

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure

      - name: Smoke bake (proves real OGG/Vorbis output end-to-end)
        run: |
          ./build/grunt verify --voice voices/heavy_brother
          ./build/grunt batch --csv scripts/sample_lines.csv \
            --voice voices/heavy_brother --out-dir build/vo --seed 1234
          test -f build/vo/mission01_open_gate.ogg \
            || (echo "expected .ogg output not produced" && exit 1)

      - name: Confirm codec is Vorbis (not Opus)
        run: |
          codec=$(ffprobe -loglevel error -show_entries stream=codec_name \
            -of default=nw=1:nk=1 build/vo/mission01_open_gate.ogg)
          echo "codec=$codec"
          test "$codec" = "vorbis" || (echo "expected vorbis, got $codec" && exit 1)

      - name: Determinism check (same seed -> identical bytes)
        run: |
          ./build/grunt synth --text "Open the gate!" --voice voices/heavy_brother \
            --seed 42 --format ogg --out a.ogg
          ./build/grunt synth --text "Open the gate!" --voice voices/heavy_brother \
            --seed 42 --format ogg --out b.ogg
          cmp a.ogg b.ogg || (echo "determinism broken" && exit 1)

  windows:
    needs: version
    name: "windows (${{ needs.version.outputs.version }})"
    runs-on: windows-latest
    env:
      GRUNT_VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Report version under test
        run: echo "Building and testing grunt $env:GRUNT_VERSION"

      - name: Install libvorbis via vcpkg
        run: vcpkg install libvorbis libogg

      - name: Configure
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Run unit tests
        run: ctest --test-dir build -C Release --output-on-failure
