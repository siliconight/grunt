name: grunt CI
run-name: >-
  grunt CI ${{ github.ref_type == 'tag' && github.ref_name || format('main-{0}', github.sha) }}

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Resolve the version once, share with every downstream job.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: v
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VER="${GITHUB_REF#refs/tags/}"
          else
            VER="$(git describe --tags --always 2>/dev/null || echo dev)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "grunt version: $VER"

  # build — compile CLI + tests with real libvorbis on Linux and Windows.
  # Lesson from gool: build with the real toolchain, not -fsyntax-only.
  build:
    needs: version
    name: "build ${{ matrix.os }} (${{ needs.version.outputs.version }})"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install libvorbis (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libvorbis-dev libogg-dev cmake

      - name: Install libvorbis (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install libvorbis libogg

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_WERROR=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Unit tests
        run: ctest --test-dir build -C Release --output-on-failure

  # ci — verification suite on Linux (real OGG/Vorbis behavior end-to-end).
  ci:
    needs: [version, build]
    name: "ci (${{ needs.version.outputs.version }})"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libvorbis + ffmpeg
        run: sudo apt-get update && sudo apt-get install -y libvorbis-dev libogg-dev cmake ffmpeg

      - name: Configure + build (warnings as errors)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DGRUNT_WERROR=ON
          cmake --build build --config Release -- -j2

      - name: Verify OGG support was detected
        run: |
          cmake -S . -B build_check 2>&1 | tee cfg.txt
          grep -q "OGG/Vorbis output enabled" cfg.txt \
            || (echo "libvorbis NOT detected — OGG path would be untested" && exit 1)

      - name: Smoke bake (real OGG/Vorbis end-to-end)
        run: |
          ./build/grunt verify --voice voices/heavy_brother
          ./build/grunt batch --csv scripts/sample_lines.csv \
            --voice voices/heavy_brother --out-dir build/vo --seed 1234
          test -f build/vo/mission01_open_gate.ogg \
            || (echo "expected .ogg output not produced" && exit 1)

      - name: Confirm codec is Vorbis (not Opus)
        run: |
          codec=$(ffprobe -loglevel error -show_entries stream=codec_name \
            -of default=nw=1:nk=1 build/vo/mission01_open_gate.ogg)
          echo "codec=$codec"
          test "$codec" = "vorbis" || (echo "expected vorbis, got $codec" && exit 1)

      - name: Determinism (same seed -> identical bytes)
        run: |
          ./build/grunt synth --text "Open the gate!" --voice voices/heavy_brother \
            --seed 42 --format ogg --out a.ogg
          ./build/grunt synth --text "Open the gate!" --voice voices/heavy_brother \
            --seed 42 --format ogg --out b.ogg
          cmp a.ogg b.ogg || (echo "determinism broken" && exit 1)

      - name: Quickstart (first-run path must produce clips from bundled bank)
        run: |
          ./build/grunt quickstart --out qs
          test -f qs/01_hello.ogg -o -f qs/01_hello.wav \
            || (echo "quickstart produced no first clip" && exit 1)
          n=$(ls qs/ | wc -l)
          test "$n" -ge 5 || (echo "quickstart made only $n clips, expected >=5" && exit 1)
